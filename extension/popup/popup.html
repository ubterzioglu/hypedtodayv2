<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hyped.today</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 16px; }
    h1 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .stat { padding: 8px; background: #f5f5f5; border-radius: 6px; text-align: center; }
    .stat-value { font-size: 20px; font-weight: 700; }
    .stat-label { font-size: 11px; color: #666; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
    button { width: 100%; padding: 8px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #333; }
    .pending { font-size: 12px; color: #666; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>hyped.today</h1>
  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
